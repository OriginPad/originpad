<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.20"/>
      <stop offset="70%" stop-color="#f59e0b" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f59e0b" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="600" height="600" fill="#0a0a0a"/>
  <rect width="600" height="600" fill="url(#grid)"/>
  <rect width="600" height="600" fill="url(#glow)"/>

  <!-- corner HUD ticks -->
  <g stroke="url(#edge)" stroke-width="2" fill="none" stroke-linecap="square">
    <path d="M 32 56 L 32 32 L 56 32"/>
    <path d="M 568 56 L 568 32 L 544 32"/>
    <path d="M 32 544 L 32 568 L 56 568"/>
    <path d="M 568 544 L 568 568 L 544 568"/>
  </g>

  <!-- central diamond emblem -->
  <g transform="translate(300 268)">
    <rect x="-72" y="-72" width="144" height="144" transform="rotate(45)" fill="none" stroke="url(#edge)" stroke-width="2.5"/>
    <rect x="-50" y="-50" width="100" height="100" transform="rotate(45)" fill="none" stroke="#f59e0b" stroke-opacity="0.30" stroke-width="1"/>
    <text x="0" y="4" font-family="ui-monospace, 'Courier New', monospace" font-size="96" font-weight="700" fill="url(#edge)" text-anchor="middle" dominant-baseline="central">?</text>
  </g>

  <!-- labels -->
  <text x="300" y="452" font-family="ui-monospace, 'Courier New', monospace" font-size="22" font-weight="700" letter-spacing="9" fill="#f59e0b" text-anchor="middle">// UNREVEALED</text>
  <text x="300" y="484" font-family="ui-monospace, 'Courier New', monospace" font-size="12" letter-spacing="4" fill="#f59e0b" fill-opacity="0.45" text-anchor="middle">RARITY HIDDEN UNTIL SELLOUT</text>
</svg>
